name: Build and Release

on:
  push:
    tags: [v*]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    name: Windows NSIS Installer
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: 3.12
      - name: Install Python AI deps
        run: pip install numpy opencv-python-headless pillow fastapi uvicorn python-multipart aiofiles
        working-directory: ai
      - name: Install app deps
        run: npm ci --legacy-peer-deps
        working-directory: app
      - name: Install renderer deps
        run: npm ci --legacy-peer-deps
        working-directory: app/renderer
      - name: Build renderer
        run: npm run build
        working-directory: app/renderer
      - name: Build Windows NSIS installer
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: npx electron-builder --win nsis --publish always
        working-directory: app
      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: app/dist/*.exe

  build-macos:
    name: macOS DMG
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install app deps
        run: npm ci --legacy-peer-deps
        working-directory: app
      - name: Install renderer deps
        run: npm ci --legacy-peer-deps
        working-directory: app/renderer
      - name: Build renderer
        run: npm run build
        working-directory: app/renderer
      - name: Build macOS DMG
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: npx electron-builder --mac dmg --publish always
        working-directory: app
      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: app/dist/*.dmg
